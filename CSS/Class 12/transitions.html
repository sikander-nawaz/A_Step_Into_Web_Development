<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Transitions in CSS</title>
    <style>
      .container{
        height: 50vh;
        width: 50vw;
        background-color: aqua;
      }
       
      .box{
        /* background-color: seagreen; */
        width: 10vh;
        height: 10vw;
        /* background-color: slateblue; */
        animation-name: myAnimation;
        /* animation-duration: 5s;
        animation-timing-function: cubic-bezier(0.075, 0.82, 0.165, 1);
        animation-delay: 1s;
        animation-iteration-count: 2; */
        /* animation: myAnimation 4s ease-in 1s infinite  ; */
        box-shadow: -32px 50px 100px 50px rgba(161, 56, 56, 0.2);
        text-shadow: 35px 7px 22px rgba(137, 28, 84, 0.5);
      }
      
      .translate{
        transform: translateX(10vw) translateY(10vh);
        background-color: violet;
      }

      @keyframes myAnimation {
            from{
                background-color: red;
            }
            to{
                transform: translateY(1000px);
                background-color: chocolate;
            }
      }

    </style>
</head>
<body>
   <div class="container">
    <div class="box ">
        box
    </div>
   </div>
</body>
</html>
